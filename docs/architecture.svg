<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 950" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="deployGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="950" fill="url(#bgGrad)"/>
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1400" height="950" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="700" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="0.5">MLOps Churn Prediction Pipeline - Vertex AI Architecture</text>
  <text x="700" y="64" text-anchor="middle" fill="#94a3b8" font-size="12">End-to-End ML Lifecycle: Extract → Engineer → Train → Evaluate → Gate → Register → Deploy → Monitor</text>

  <!-- ═══════ DATA LAYER (Left) ═══════ -->
  <text x="140" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">DATA LAYER</text>

  <!-- BigQuery -->
  <rect x="40" y="120" width="200" height="70" rx="8" fill="#1e3a5f" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="146" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600">BIGQUERY</text>
  <text x="140" y="163" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">retail_gold</text>
  <text x="140" y="180" text-anchor="middle" fill="#94a3b8" font-size="9">dim_customer  ·  fct_daily_sales</text>

  <!-- Feature View -->
  <rect x="40" y="210" width="200" height="50" rx="8" fill="#1e3a5f" stroke="#06b6d4" stroke-width="1" opacity="0.8" filter="url(#shadow)"/>
  <text x="140" y="232" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600">FEATURE VIEW</text>
  <text x="140" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">v_customer_churn_features</text>

  <!-- Cloud Storage -->
  <rect x="40" y="280" width="200" height="60" rx="8" fill="#1e3a5f" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="304" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600">CLOUD STORAGE</text>
  <text x="140" y="321" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">gs://mlops-project-489016</text>
  <text x="140" y="334" text-anchor="middle" fill="#94a3b8" font-size="9">Pipeline artifacts  ·  Model binaries</text>

  <!-- Arrow BQ → Feature View -->
  <line x1="140" y1="190" x2="140" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════ PIPELINE LAYER (Center) ═══════ -->
  <text x="640" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">KUBEFLOW PIPELINE - VERTEX AI PIPELINES</text>

  <!-- Pipeline container -->
  <rect x="310" y="115" width="660" height="580" rx="12" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Step 1: Extract Data -->
  <rect x="350" y="140" width="180" height="55" rx="6" fill="url(#pipeGrad)" filter="url(#shadow)"/>
  <text x="440" y="163" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">1. Extract Data</text>
  <text x="440" y="180" text-anchor="middle" fill="#bfdbfe" font-size="9">BigQuery → CSV</text>

  <!-- Step 2: Feature Engineering -->
  <rect x="570" y="140" width="180" height="55" rx="6" fill="url(#pipeGrad)" filter="url(#shadow)"/>
  <text x="660" y="163" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">2. Feature Eng.</text>
  <text x="660" y="180" text-anchor="middle" fill="#bfdbfe" font-size="9">StandardScaler  ·  80/20 Split</text>

  <!-- Step 3: Train Model -->
  <rect x="350" y="230" width="180" height="55" rx="6" fill="url(#pipeGrad)" filter="url(#shadow)"/>
  <text x="440" y="253" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">3. Train Model</text>
  <text x="440" y="270" text-anchor="middle" fill="#bfdbfe" font-size="9">XGBoost  ·  100 trees  ·  .bst</text>

  <!-- Step 4: Evaluate Model -->
  <rect x="570" y="230" width="180" height="55" rx="6" fill="url(#pipeGrad)" filter="url(#shadow)"/>
  <text x="660" y="253" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">4. Evaluate Model</text>
  <text x="660" y="270" text-anchor="middle" fill="#bfdbfe" font-size="9">AUC  ·  Accuracy  ·  F1</text>

  <!-- Deployment Gate (Diamond) -->
  <g transform="translate(460, 340)">
    <polygon points="90,0 180,55 90,110 0,55" fill="url(#gateGrad)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="90" y="48" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">DEPLOY</text>
    <text x="90" y="64" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">GATE</text>
    <text x="90" y="84" text-anchor="middle" fill="#fef3c7" font-size="10">AUC ≥ 0.75?</text>
  </g>

  <!-- FAIL box - moved further right with clearance -->
  <rect x="730" y="365" width="130" height="40" rx="4" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="795" y="382" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">FAIL → Pipeline</text>
  <text x="795" y="396" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">ends. No deploy.</text>

  <!-- PASS label -->
  <text x="510" y="488" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">✓ PASS</text>

  <!-- Step 5: Register Model -->
  <rect x="370" y="505" width="180" height="55" rx="6" fill="url(#deployGrad)" filter="url(#shadow)"/>
  <text x="460" y="528" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">5. Register Model</text>
  <text x="460" y="545" text-anchor="middle" fill="#d1fae5" font-size="9">Model Registry  ·  Versioned</text>

  <!-- Step 6: Deploy to Endpoint -->
  <rect x="590" y="505" width="180" height="55" rx="6" fill="url(#deployGrad)" filter="url(#shadow)"/>
  <text x="680" y="528" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">6. Deploy Endpoint</text>
  <text x="680" y="545" text-anchor="middle" fill="#d1fae5" font-size="9">HTTPS  ·  n1-standard-2</text>

  <!-- Metrics box -->
  <rect x="360" y="600" width="400" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="560" y="622" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">MODEL METRICS (v1)</text>
  <text x="420" y="650" text-anchor="middle" fill="#10b981" font-size="22" font-weight="700">0.8883</text>
  <text x="420" y="668" text-anchor="middle" fill="#94a3b8" font-size="9">AUC-ROC</text>
  <text x="510" y="650" text-anchor="middle" fill="#60a5fa" font-size="22" font-weight="700">0.80</text>
  <text x="510" y="668" text-anchor="middle" fill="#94a3b8" font-size="9">Accuracy</text>
  <text x="600" y="650" text-anchor="middle" fill="#a78bfa" font-size="22" font-weight="700">0.79</text>
  <text x="600" y="668" text-anchor="middle" fill="#94a3b8" font-size="9">Precision</text>
  <text x="690" y="650" text-anchor="middle" fill="#f472b6" font-size="22" font-weight="700">0.79</text>
  <text x="690" y="668" text-anchor="middle" fill="#94a3b8" font-size="9">F1 Score</text>

  <!-- ═══════ SERVING LAYER (Right) ═══════ -->
  <text x="1200" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">SERVING LAYER</text>

  <!-- Model Registry -->
  <rect x="1090" y="135" width="220" height="65" rx="8" fill="#1a3326" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1200" y="158" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">MODEL REGISTRY</text>
  <text x="1200" y="175" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">churn-prediction-pipeline</text>
  <text x="1200" y="191" text-anchor="middle" fill="#94a3b8" font-size="9">XGBoost v3  ·  .bst format</text>

  <!-- Endpoint -->
  <rect x="1090" y="225" width="220" height="65" rx="8" fill="#1a3326" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1200" y="248" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">PREDICTION ENDPOINT</text>
  <text x="1200" y="265" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">churn-monitoring-endpoint</text>
  <text x="1200" y="281" text-anchor="middle" fill="#94a3b8" font-size="9">HTTPS  ·  Real-time  ·  n1-standard-2</text>

  <!-- Prediction Examples -->
  <rect x="1090" y="320" width="220" height="90" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="1200" y="342" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">LIVE PREDICTION RESULTS</text>
  <text x="1110" y="365" fill="#10b981" font-size="10">High-value:</text>
  <text x="1290" y="365" text-anchor="end" fill="#10b981" font-size="10" font-weight="600">25.1% → ACTIVE</text>
  <text x="1110" y="383" fill="#ef4444" font-size="10">At-risk:</text>
  <text x="1290" y="383" text-anchor="end" fill="#ef4444" font-size="10" font-weight="600">98.5% → CHURN</text>
  <text x="1110" y="401" fill="#60a5fa" font-size="10">Medium:</text>
  <text x="1290" y="401" text-anchor="end" fill="#60a5fa" font-size="10" font-weight="600">20.7% → ACTIVE</text>

  <!-- Monitoring -->
  <text x="1200" y="440" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">MONITORING</text>
  <rect x="1090" y="455" width="220" height="85" rx="8" fill="#2d1b4e" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1200" y="478" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600">DRIFT DETECTION</text>
  <text x="1200" y="497" text-anchor="middle" fill="#e2e8f0" font-size="10">Prediction Drift Monitor</text>
  <text x="1200" y="514" text-anchor="middle" fill="#94a3b8" font-size="9">Threshold: 0.3  ·  Hourly  ·  8 features</text>
  <text x="1200" y="530" text-anchor="middle" fill="#c4b5fd" font-size="9">Email alerts on drift</text>

  <!-- ═══════ ARROWS ═══════ -->
  <line x1="240" y1="155" x2="350" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="167" x2="570" y2="167" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="195" x2="440" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="195" x2="660" y2="230" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="258" x2="570" y2="258" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="285" x2="580" y2="340" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="450" x2="500" y2="505" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="640" y1="395" x2="730" y2="385" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <line x1="550" y1="532" x2="590" y2="532" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="770" y1="532" x2="1090" y2="260" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <line x1="1200" y1="290" x2="1200" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1200" y1="410" x2="1200" y2="455" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════ INFO BOXES (Bottom Left) ═══════ -->
  <rect x="40" y="380" width="200" height="140" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="402" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">8 INPUT FEATURES</text>
  <text x="55" y="424" fill="#94a3b8" font-size="9">purchase_frequency</text>
  <text x="170" y="424" fill="#64748b" font-size="8">★ dominant</text>
  <text x="55" y="440" fill="#94a3b8" font-size="9">total_spend</text>
  <text x="55" y="456" fill="#94a3b8" font-size="9">avg_order_value</text>
  <text x="55" y="472" fill="#94a3b8" font-size="9">unique_products_bought</text>
  <text x="55" y="488" fill="#94a3b8" font-size="9">spend_variability</text>
  <text x="55" y="504" fill="#94a3b8" font-size="9">customer_tenure_days</text>

  <rect x="40" y="540" width="200" height="140" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="140" y="562" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">TECH STACK</text>
  <text x="55" y="584" fill="#94a3b8" font-size="9">Vertex AI Pipelines</text>
  <text x="55" y="600" fill="#94a3b8" font-size="9">Kubeflow SDK (KFP v2)</text>
  <text x="55" y="616" fill="#94a3b8" font-size="9">XGBoost  ·  scikit-learn</text>
  <text x="55" y="632" fill="#94a3b8" font-size="9">BigQuery  ·  Cloud Storage</text>
  <text x="55" y="648" fill="#94a3b8" font-size="9">Model Registry  ·  Endpoints</text>
  <text x="55" y="664" fill="#94a3b8" font-size="9">gcloud CLI  ·  Python 3.10</text>

  <!-- Footer -->
  <rect x="0" y="920" width="1400" height="30" fill="#0f172a" opacity="0.8"/>
  <text x="700" y="939" text-anchor="middle" fill="#475569" font-size="10">MLOps Churn Prediction Pipeline  ·  Vertex AI  ·  Built March 2026</text>
</svg>
