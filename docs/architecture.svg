<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="gateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="deployGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="monitorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="900" fill="url(#grid)"/>
  </g>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="0.5">MLOps Churn Prediction Pipeline  -  Vertex AI Architecture</text>
  <text x="600" y="64" text-anchor="middle" fill="#94a3b8" font-size="12">End-to-End ML Lifecycle: Extract → Engineer → Train → Evaluate → Gate → Register → Deploy → Monitor</text>

  <!-- ═══════════════════════ DATA LAYER (Left) ═══════════════════════ -->
  <text x="130" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">DATA LAYER</text>

  <!-- BigQuery -->
  <rect x="40" y="120" width="180" height="70" rx="8" fill="#1e3a5f" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="146" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600">BIGQUERY</text>
  <text x="130" y="162" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">retail_gold</text>
  <text x="130" y="178" text-anchor="middle" fill="#94a3b8" font-size="9">dim_customer · fct_daily_sales</text>

  <!-- Feature View -->
  <rect x="40" y="210" width="180" height="50" rx="8" fill="#1e3a5f" stroke="#06b6d4" stroke-width="1" opacity="0.8" filter="url(#shadow)"/>
  <text x="130" y="232" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600">FEATURE VIEW</text>
  <text x="130" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">v_customer_churn_features</text>

  <!-- Cloud Storage -->
  <rect x="40" y="280" width="180" height="60" rx="8" fill="#1e3a5f" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="130" y="304" text-anchor="middle" fill="#06b6d4" font-size="10" font-weight="600">CLOUD STORAGE</text>
  <text x="130" y="320" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">gs://mlops-project-489016</text>
  <text x="130" y="333" text-anchor="middle" fill="#94a3b8" font-size="9">Pipeline artifacts · Model binaries</text>

  <!-- Arrow BQ → Feature View -->
  <line x1="130" y1="190" x2="130" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════ PIPELINE LAYER (Center) ═══════════════════════ -->
  <text x="580" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">KUBEFLOW PIPELINE  -  VERTEX AI PIPELINES</text>

  <!-- Pipeline container outline -->
  <rect x="280" y="115" width="600" height="540" rx="12" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- Step 1: Extract Data -->
  <rect x="310" y="135" width="160" height="55" rx="6" fill="url(#pipeGrad)" filter="url(#shadow)"/>
  <text x="390" y="158" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">1. Extract Data</text>
  <text x="390" y="175" text-anchor="middle" fill="#bfdbfe" font-size="9">BigQuery → CSV</text>

  <!-- Step 2: Feature Engineering -->
  <rect x="500" y="135" width="160" height="55" rx="6" fill="url(#pipeGrad)" filter="url(#shadow)"/>
  <text x="580" y="158" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">2. Feature Eng.</text>
  <text x="580" y="175" text-anchor="middle" fill="#bfdbfe" font-size="9">StandardScaler · 80/20 Split</text>

  <!-- Step 3: Train Model -->
  <rect x="310" y="220" width="160" height="55" rx="6" fill="url(#pipeGrad)" filter="url(#shadow)"/>
  <text x="390" y="243" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">3. Train Model</text>
  <text x="390" y="260" text-anchor="middle" fill="#bfdbfe" font-size="9">XGBoost · 100 trees · .bst</text>

  <!-- Step 4: Evaluate Model -->
  <rect x="500" y="220" width="160" height="55" rx="6" fill="url(#pipeGrad)" filter="url(#shadow)"/>
  <text x="580" y="243" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">4. Evaluate Model</text>
  <text x="580" y="260" text-anchor="middle" fill="#bfdbfe" font-size="9">AUC · Accuracy · F1</text>

  <!-- Deployment Gate (Diamond) -->
  <g transform="translate(490, 320)">
    <polygon points="80,0 160,50 80,100 0,50" fill="url(#gateGrad)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="80" y="45" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">DEPLOY</text>
    <text x="80" y="60" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">GATE</text>
    <text x="80" y="78" text-anchor="middle" fill="#fef3c7" font-size="9">AUC ≥ 0.75?</text>
  </g>

  <!-- Step 5: Register Model -->
  <rect x="340" y="460" width="160" height="55" rx="6" fill="url(#deployGrad)" filter="url(#shadow)"/>
  <text x="420" y="483" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">5. Register Model</text>
  <text x="420" y="500" text-anchor="middle" fill="#d1fae5" font-size="9">Model Registry · Versioned</text>

  <!-- Step 6: Deploy to Endpoint -->
  <rect x="540" y="460" width="160" height="55" rx="6" fill="url(#deployGrad)" filter="url(#shadow)"/>
  <text x="620" y="483" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">6. Deploy Endpoint</text>
  <text x="620" y="500" text-anchor="middle" fill="#d1fae5" font-size="9">HTTPS · n1-standard-2</text>

  <!-- FAIL path label -->
  <rect x="700" y="348" width="110" height="32" rx="4" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
  <text x="755" y="360" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">FAIL → Pipeline</text>
  <text x="755" y="373" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">ends. No deploy.</text>

  <!-- PASS label -->
  <text x="520" y="445" text-anchor="middle" fill="#10b981" font-size="10" font-weight="700">✓ PASS</text>

  <!-- FAIL label -->
  <text x="680" y="355" text-anchor="start" fill="#ef4444" font-size="10" font-weight="700"></text>

  <!-- Metrics box -->
  <rect x="310" y="560" width="375" height="80" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="497" y="582" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600">MODEL METRICS (v1)</text>
  <text x="370" y="602" text-anchor="middle" fill="#10b981" font-size="20" font-weight="700">0.8883</text>
  <text x="370" y="618" text-anchor="middle" fill="#94a3b8" font-size="9">AUC-ROC</text>
  <text x="460" y="602" text-anchor="middle" fill="#60a5fa" font-size="20" font-weight="700">0.80</text>
  <text x="460" y="618" text-anchor="middle" fill="#94a3b8" font-size="9">Accuracy</text>
  <text x="540" y="602" text-anchor="middle" fill="#a78bfa" font-size="20" font-weight="700">0.79</text>
  <text x="540" y="618" text-anchor="middle" fill="#94a3b8" font-size="9">Precision</text>
  <text x="620" y="602" text-anchor="middle" fill="#f472b6" font-size="20" font-weight="700">0.79</text>
  <text x="620" y="618" text-anchor="middle" fill="#94a3b8" font-size="9">F1 Score</text>

  <!-- ═══════════════════════ SERVING LAYER (Right) ═══════════════════════ -->
  <text x="1040" y="105" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">SERVING LAYER</text>

  <!-- Model Registry -->
  <rect x="940" y="135" width="200" height="65" rx="8" fill="#1a3326" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1040" y="158" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">MODEL REGISTRY</text>
  <text x="1040" y="175" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">churn-prediction-pipeline</text>
  <text x="1040" y="190" text-anchor="middle" fill="#94a3b8" font-size="9">XGBoost v3 · .bst format</text>

  <!-- Endpoint -->
  <rect x="940" y="225" width="200" height="65" rx="8" fill="#1a3326" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1040" y="248" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">PREDICTION ENDPOINT</text>
  <text x="1040" y="265" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="500">churn-monitoring-endpoint</text>
  <text x="1040" y="280" text-anchor="middle" fill="#94a3b8" font-size="9">HTTPS · Real-time · n1-standard-2</text>

  <!-- Prediction Examples -->
  <rect x="940" y="315" width="200" height="85" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="1040" y="335" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">LIVE PREDICTION RESULTS</text>
  <text x="960" y="355" fill="#10b981" font-size="10">High-value:</text>
  <text x="1120" y="355" text-anchor="end" fill="#10b981" font-size="10" font-weight="600">25.1% → ACTIVE</text>
  <text x="960" y="373" fill="#ef4444" font-size="10">At-risk:</text>
  <text x="1120" y="373" text-anchor="end" fill="#ef4444" font-size="10" font-weight="600">98.5% → CHURN</text>
  <text x="960" y="391" fill="#60a5fa" font-size="10">Medium:</text>
  <text x="1120" y="391" text-anchor="end" fill="#60a5fa" font-size="10" font-weight="600">20.7% → ACTIVE</text>

  <!-- ═══════════════════════ MONITORING LAYER (Bottom Right) ═══════════════════════ -->
  <text x="1040" y="435" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">MONITORING</text>

  <rect x="940" y="450" width="200" height="80" rx="8" fill="#2d1b4e" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1040" y="473" text-anchor="middle" fill="#8b5cf6" font-size="10" font-weight="600">DRIFT DETECTION</text>
  <text x="1040" y="492" text-anchor="middle" fill="#e2e8f0" font-size="10">Prediction Drift Monitor</text>
  <text x="1040" y="508" text-anchor="middle" fill="#94a3b8" font-size="9">Threshold: 0.3 · Hourly · 8 features</text>
  <text x="1040" y="522" text-anchor="middle" fill="#c4b5fd" font-size="9">Email alerts on drift</text>

  <!-- ═══════════════════════ ARROWS ═══════════════════════ -->

  <!-- Data layer → Pipeline -->
  <line x1="220" y1="155" x2="310" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="220" y1="310" x2="280" y2="310" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Pipeline internal arrows -->
  <line x1="470" y1="162" x2="500" y2="162" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="190" x2="390" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="190" x2="580" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="248" x2="500" y2="248" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Evaluate → Gate -->
  <line x1="580" y1="275" x2="570" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Gate → PASS (down to register/deploy) -->
  <line x1="540" y1="420" x2="500" y2="460" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Gate → FAIL (right) -->
  <line x1="650" y1="370" x2="700" y2="365" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Register → Deploy -->
  <line x1="500" y1="487" x2="540" y2="487" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pipeline → Serving layer -->
  <line x1="700" y1="487" x2="940" y2="260" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>

  <!-- Endpoint → Monitoring -->
  <line x1="1040" y1="290" x2="1040" y2="315" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1040" y1="400" x2="1040" y2="450" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════ FEATURE LABELS ═══════════════════════ -->

  <!-- Features box -->
  <rect x="40" y="370" width="180" height="130" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="392" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">8 INPUT FEATURES</text>
  <text x="55" y="412" fill="#94a3b8" font-size="9">purchase_frequency</text>
  <text x="55" y="426" fill="#94a3b8" font-size="9">total_spend</text>
  <text x="55" y="440" fill="#94a3b8" font-size="9">avg_order_value</text>
  <text x="55" y="454" fill="#94a3b8" font-size="9">unique_products_bought</text>
  <text x="55" y="468" fill="#94a3b8" font-size="9">spend_variability</text>
  <text x="55" y="482" fill="#94a3b8" font-size="9">customer_tenure_days</text>
  <text x="150" y="412" fill="#64748b" font-size="9">★ dominant</text>

  <!-- Tech stack -->
  <rect x="40" y="520" width="180" height="120" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="130" y="542" text-anchor="middle" fill="#f59e0b" font-size="10" font-weight="600">TECH STACK</text>
  <text x="55" y="562" fill="#94a3b8" font-size="9">Vertex AI Pipelines</text>
  <text x="55" y="576" fill="#94a3b8" font-size="9">Kubeflow SDK (KFP v2)</text>
  <text x="55" y="590" fill="#94a3b8" font-size="9">XGBoost · scikit-learn</text>
  <text x="55" y="604" fill="#94a3b8" font-size="9">BigQuery · Cloud Storage</text>
  <text x="55" y="618" fill="#94a3b8" font-size="9">Model Registry · Endpoints</text>
  <text x="55" y="632" fill="#94a3b8" font-size="9">gcloud CLI · Python 3.10</text>

  <!-- Footer -->
  <rect x="0" y="870" width="1200" height="30" fill="#0f172a" opacity="0.8"/>
  <text x="600" y="889" text-anchor="middle" fill="#475569" font-size="10">MLOps Churn Prediction Pipeline · Vertex AI · Built March 2026</text>
</svg>
